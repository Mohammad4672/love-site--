<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Secret Love</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* login */
#loginBox{
  background:rgba(0,0,0,0.35);
  padding:25px;
  border-radius:20px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* app */
#app{
  display:none;
  flex-direction:column;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.3);
  padding:20px;
  border-radius:20px;
  width:320px;
}

audio{
  width:260px;
  margin-top:10px;
}

/* hearts */
.heart{
  position:absolute;
  top:-10px;
  font-size:20px;
  animation:fall 5s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10px);}
  100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔒 Secret Love</h2>
  <input type="password" id="pass" placeholder="password">
  <br>
  <button onclick="check()">Unlock 💖</button>
  <div id="error"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="box">

    <h2>💖 Welcome</h2>

    <!-- RECORD -->
    <button onclick="startRec()">🎙️ Record</button>
    <button onclick="stopRec()">⛔ Stop & Save</button>

    <audio id="audio" controls></audio>

    <br>

    <button onclick="loveMsg()">💌 Love Message</button>
    <p id="msg">...</p>

  </div>
</div>

<!-- HEARTBEAT SOUND -->
<audio id="heartbeat" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_2b9b7f2a1c.mp3?filename=slow-heartbeat-ambient-121481.mp3">
</audio>

<script>

let rec;
let chunks=[];
let stream;

/* 🔐 LOGIN */
function check(){
  const pass = document.getElementById("pass").value;

  if(pass === "love123"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="flex";

    setInterval(createHeart,300);

    // 💓 sound
    document.getElementById("heartbeat").play();

  } else {
    document.getElementById("error").innerText="❌ Wrong password";
  }
}

/* 🎙️ RECORD */
async function startRec(){
  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  rec = new MediaRecorder(stream);
  chunks=[];

  rec.ondataavailable = e => chunks.push(e.data);

  rec.onstop = () => {
    const blob = new Blob(chunks,{type:"audio/webm"});
    const url = URL.createObjectURL(blob);

    document.getElementById("audio").src = url;

    // 💾 SAVE (fix: no disappearing)
    const a = document.createElement("a");
    a.href = url;
    a.download = "love-voice.webm";
    a.click();
  };

  rec.start();
}

function stopRec(){
  rec.stop();
  stream.getTracks().forEach(t=>t.stop());
}

/* 💌 messages */
function loveMsg(){
  const msgs=[
    "💖 I miss you...",
    "💫 you are my everything...",
    "💘 my heart is yours...",
    "🌙 always thinking of you...",
    "💖 you are my home..."
  ];

  document.getElementById("msg").innerText =
    msgs[Math.floor(Math.random()*msgs.length)];
}

/* 💖 hearts */
function createHeart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}

</script>

</body>
</html>
