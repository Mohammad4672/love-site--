<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 Love Message</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  color:white;
  text-align:center;
}

.box{
  background:rgba(0,0,0,0.3);
  padding:20px;
  border-radius:15px;
  max-width:300px;
}

button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<div class="box">
  <h1>💖 رسالة إلك</h1>
  <p>
    ما بعرف كيف اشرحلك شعوري…  
    بس كل مرة بسمع صوتك بحس الدنيا أحلى 💫  
  </p>

  <button onclick="playMusic()">شغّل الموسيقى 🎵</button>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
  document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
<audio id="bgMusic" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
