<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Love + Voice</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

.card{
  background:rgba(0,0,0,0.35);
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:400px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  margin:6px;
  cursor:pointer;
  font-size:15px;
}

/* قلوب */
.heart{
  position:absolute;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<div class="card">
  <h2>💖 رسالة حب</h2>
  <p>اضغط لتسمع صوتي 💕</p>

  <!-- زر تشغيل الصوت -->
  <button onclick="playAll()">💖 اسمع الرسالة</button>

  <!-- الصوت -->
  <audio id="voice">
    <source src="voice.mp3" type="audio/mpeg">
  </audio>

</div>

<script>

/* 🎤 تشغيل الصوت */
function playAll(){
  document.getElementById("voice").play();
}

/* 💖 قلوب متحركة */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},250);

</script>

</body>
</html>
