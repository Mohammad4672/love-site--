<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Love Story</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* الكارد الرئيسي */
.card{
  background:rgba(0,0,0,0.4);
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:420px;
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  margin:6px;
  cursor:pointer;
  font-size:15px;
}

/* صفحات داخلية */
.page{ display:none; }
.page.active{ display:block; }

/* قلوب */
.heart{
  position:absolute;
  color:white;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}

/* رسالة سرية */
#secret{
  opacity:0;
  transition:1s;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">

  <!-- PAGE 1 -->
  <div class="page active" id="p1">
    <h2>💖 بداية القصة</h2>
    <p>كل شي بلّش من نظرة… وصار حب كبير 💕</p>
    <button onclick="next(2)">➡️ نكمل</button>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="p2">
    <h2>🎤 صوتي إلك</h2>

    <button onclick="playVoice()">▶️ اسمع الرسالة</button>

    <audio id="voice">
      <source src="https://drive.google.com/uc?export=download&id=15kkgKCFB3i6LJ659gwSDaqMPW60DT1cp">
    </audio>

    <br>
    <button onclick="next(3)">➡️ نكمل</button>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="p3">
    <h2>🎶 موسيقى الحب</h2>

    <button onclick="playMusic()">▶️ تشغيل الموسيقى</button>

    <audio id="music" loop>
      <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1b6c2.mp3">
    </audio>

    <br>
    <button onclick="next(4)">💌 النهاية</button>
  </div>

  <!-- PAGE 4 -->
  <div class="page" id="p4">
    <h2>💌 رسالة أخيرة</h2>

    <p id="secret">أنا بحبك أكتر من كل شي 💖</p>
  </div>

</div>

<script>

function next(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("p"+n).classList.add("active");

  if(n==4){
    setTimeout(()=>{
      document.getElementById("secret").style.opacity=1;
    },1500);
  }
}

/* 🎤 تشغيل الصوت */
function playVoice(){
  document.getElementById("voice").play();
}

/* 🎶 تشغيل الموسيقى */
function playMusic(){
  let m = document.getElementById("music");
  m.volume = 0.3;
  m.play();
}

/* 💖 قلوب */
setInterval(()=>{
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},250);

</script>

</body>
</html>
