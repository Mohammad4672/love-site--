<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Love Message</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.card{
  background:rgba(0,0,0,0.4);
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:420px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  margin:6px;
  cursor:pointer;
  font-size:15px;
}

/* قلوب */
.heart{
  position:absolute;
  color:white;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<div class="card">

  <h2>💖 رسالة حب إلك</h2>

  <p>اضغط وشوف المفاجأة 🎤</p>

  <!-- 💖 زر القلب = تشغيل الصوت -->
  <button onclick="playVoice()" style="font-size:35px;background:none;border:none;">
    💖
  </button>

  <br>

  <!-- 🔊 الصوت -->
  <audio id="voice">
    <source src="voice.mp3" type="audio/mpeg">
  </audio>

  <br>

  <button onclick="playMusic()">🎶 موسيقى</button>

  <audio id="music" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1b6c2.mp3">
  </audio>

</div>

<script>

/* 🎤 تشغيل الصوت */
function playVoice(){
  document.getElementById("voice").play();
}

/* 🎶 تشغيل الموسيقى */
function playMusic(){
  let m = document.getElementById("music");
  m.volume = 0.3;
  m.play();
}

/* 💖 قلوب */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},250);

</script>

</body>
</
  <audio controls>

</audio>
