<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🎤 + 🎶 Mix</title>
</head>

<body style="text-align:center;font-family:Arial;margin-top:60px;background:#ff99ac;color:white;">

<h2>🎤 تسجيل مع موسيقى</h2>

<button onclick="startAll()">▶️ Start</button>
<button onclick="stopRec()">⛔ Stop</button>

<br><br>

<audio id="recorded" controls></audio>

<!-- 🎶 موسيقى خلفية -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1b6c2.mp3">
</audio>

<script>

let recorder;
let chunks = [];
let stream;

/* ▶️ تشغيل الموسيقى + التسجيل */
async function startAll(){

  try {

    // 🎤 ميكروفون
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    recorder = new MediaRecorder(stream);
    chunks = [];

    recorder.ondataavailable = e => {
      if(e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const url = URL.createObjectURL(blob);
      document.getElementById("recorded").src = url;
    };

    recorder.start();

    // 🎶 تشغيل الموسيقى بنفس الوقت
    let music = document.getElementById("music");
    music.volume = 0.3;
    music.play();

    alert("🎤🎶 عم تسجّل + موسيقى شغالة!");

  } catch(err){
    alert("❌ ما في إذن مايك أو مشكلة بالمتصفح");
    console.log(err);
  }
}

/* ⛔ إيقاف الكل */
function stopRec(){

  if(recorder && recorder.state !== "inactive"){
    recorder.stop();
  }

  // وقف الموسيقى
  document.getElementById("music").pause();
  document.getElementById("music").currentTime = 0;
}

</script>

</body>
</html>
