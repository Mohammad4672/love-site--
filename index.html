<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  color:white;
  text-align:center;
}

.box{
  background:rgba(0,0,0,0.35);
  padding:25px;
  border-radius:20px;
  max-width:320px;
}

button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<div class="box">
  <h1>💖 رسالة حب</h1>
  <p>كل لحظة معك إلها معنى 💫</p>
  <button onclick="playMusic()">شغّل الموسيقى 🎵</button>
</div>

<audio id="music" loop>
  <!-- صوت جاهز من الإنترنت -->
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5b1d7b2.mp3?filename=romantic-love-ambient-110397.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
  document.getElementById("music").play();
}
</script>

</body>
</html>
