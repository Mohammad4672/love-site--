<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Secret Page</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
  margin-top: 120px;
}

.box {
  background: #222;
  padding: 20px;
  width: 300px;
  margin: auto;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

#content {
  display: none;
  margin-top: 20px;
}

img {
  max-width: 90%;
  border-radius: 15px;
}
input, button {
  padding: 10px;
  margin-top: 10px;
  width: 90%;
  border-radius: 8px;
  border: none;
}
button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #ff2f55;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 أدخل كلمة السر</h2>

  <input type="password" id="pass" placeholder="Password">
  <button onclick="checkPass()">دخول</button>

  <div id="content">
    <h2>💖 الصورة السرّية</h2>
    <img src="image.jpg" alt="secret image">
  </div>
</div>

<script>
function checkPass() {
  let password = document.getElementById("pass").value;

  if(password === "Ruba123") {
    document.getElementById("content").style.display = "block";
  } else {
    alert("❌ كلمة السر غلط");
  }
}
</script>

</body>
</html>
